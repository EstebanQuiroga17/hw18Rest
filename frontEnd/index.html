<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <div class="container py-4" style="max-width: 800px;">
      <h1 class="mb-4">Customer Dashboard</h1>

      <!-- SECCIÓN: Total Gastado -->
      <div class="bg-success-subtle p-3 rounded mb-4">
        <h2 class="h4 m-0 text-success-emphasis">Total Gastado: $<span id="totalSpent">0.00</span></h2>
      </div>

      <!-- SECCIÓN: Ingresar Cliente -->
      <div class="card p-4 mb-4 shadow-sm bg-light">
        <h3 class="h5 card-title mb-3">Ingresar Nuevo Cliente</h3>
        <form id="customerForm" class="row g-3 align-items-end">
          <div class="col-md-4">
            <label for="name" class="form-label fw-bold small mb-1">Name:</label>
            <input type="text" id="name" required class="form-control">
          </div>
          <div class="col-md-3">
            <label for="age" class="form-label fw-bold small mb-1">Age:</label>
            <input type="number" id="age" required class="form-control">
          </div>
          <div class="col-md-3">
            <label for="moneySpent" class="form-label fw-bold small mb-1">Money Spent:</label>
            <input type="number" id="moneySpent" step="0.01" min="0" required class="form-control">
          </div>
          <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">Guardar</button>
          </div>
        </form>
      </div>

      <h3 class="h5 mb-3">Listado de Clientes</h3>
      <div class="table-responsive shadow-sm rounded">
        <table class="table table-striped table-hover align-middle border mb-0">
          <thead class="table-light border-bottom">
            <tr>
              <th scope="col" class="px-3">ID</th>
              <th scope="col" class="px-3">Nombre</th>
              <th scope="col" class="px-3">Edad</th>
              <th scope="col" class="px-3">Gastado ($)</th>
              <th scope="col" class="px-3">Acciones</th>
            </tr>
          </thead>
          <tbody id="customerTableBody">
            <tr><td colspan="5" class="text-center py-3 text-muted">Cargando clientes...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
